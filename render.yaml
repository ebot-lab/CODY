services:
  - type: web
    name: cody-whatsapp-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node redirect.js && node index.js
    disk:
      name: database-storage
      mountPath: /app/database
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OWNER_NUMBER
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: BOT_NAME
        sync: false
      - key: SESSION_ID
        sync: false
      - key: PREFIX
        sync: false
